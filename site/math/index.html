            // ======== MD 解析器 ========
            function parseMd(text) {
                const lines = text.trim().split("\n");
                const chain = { meta: {}, modules: [] };
                let i = 0;
                // frontmatter
                if (lines[i] === "---") {
                    i++;
                    while (i < lines.length && lines[i] !== "---") {
                        const [k, ...v] = lines[i].split(":");
                        chain.meta[k.trim()] = v.join(":").trim();
                        i++;
                    }
                    i++; // skip ---
                }
                // modules
                let current = null;
                for (; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line.startsWith("## ")) {
                        if (current) chain.modules.push(current);
                        current = {
                            name: line
                                .replace(/^##\s+/, "")
                                .replace(/^模块\d+：/, ""),
                            book: "",
                            formal: [],
                            intuitive: [],
                        };
                    } else if (line.startsWith("book:")) {
                        if (current) current.book = line.slice(5).trim();
                    } else if (line.startsWith("formal:")) {
                        if (current)
                            current.formal = line
                                .slice(7)
                                .trim()
                                .split(/[,，]/)
                                .map((s) => s.trim())
                                .filter(Boolean);
                    } else if (line.startsWith("intuitive:")) {
                        if (current)
                            current.intuitive = line
                                .slice(10)
                                .trim()
                                .split(/[,，]/)
                                .map((s) => s.trim())
                                .filter(Boolean);
                    }
                }
                if (current) chain.modules.push(current);
                return chain;
            }

            // ======== 渲染 ========
            const ICON_CLASS = {
                "📈": "func",
                "📐": "geom",
                "⚖️": "algebra",
                "🎲": "prob",
                "🧠": "think",
            };

            function renderChains(chains, filter = "") {
                const container = document.getElementById("chainsContainer");
                container.innerHTML = "";
                const kw = filter.trim().toLowerCase();

                chains.forEach((chain, idx) => {
                    const hasMatch =
                        !kw ||
                        chain.modules.some(
                            (m) =>
                                m.name.toLowerCase().includes(kw) ||
                                m.formal.some((t) =>
                                    t.toLowerCase().includes(kw),
                                ) ||
                                m.intuitive.some((t) =>
                                    t.toLowerCase().includes(kw),
                                ),
                        );
                    if (!hasMatch) return;

                    const expanded = kw
                        ? " expanded"
                        : idx === 0
                          ? " expanded"
                          : "";
                    const el = document.createElement("div");
                    el.className = "mainline" + expanded;
                    el.id = "mainline" + idx;

                    let modulesHtml = "";
                    if (chain.modules.length === 0) {
                        modulesHtml =
                            '<div class="empty-module">内容细化中...</div>';
                    } else {
                        modulesHtml =
                            '<div class="modules-grid">' +
                            chain.modules
                                .map((m) => {
                                    if (
                                        kw &&
                                        !m.name.toLowerCase().includes(kw) &&
                                        !m.formal.some((t) =>
                                            t.toLowerCase().includes(kw),
                                        ) &&
                                        !m.intuitive.some((t) =>
                                            t.toLowerCase().includes(kw),
                                        )
                                    ) {
                                        return "";
                                    }
                                    const formalTags = m.formal
                                        .map(
                                            (t) =>
                                                `<a class="tag formal" href="concept.html?name=${encodeURIComponent(t)}"><span class="queue-indicator"></span>${t}</a>`,
                                        )
                                        .join("");
                                    const intuitiveTags = m.intuitive
                                        .map(
                                            (t) =>
                                                `<a class="tag intuitive" href="concept.html?name=${encodeURIComponent(t)}"><span class="queue-indicator"></span>${t}</a>`,
                                        )
                                        .join("");
                                    return `<div class="module-card">
          <div class="module-header">
            <div class="module-name">${m.name}</div>
            <div class="module-arrow">→</div>
          </div>
          <div class="module-book">${m.book}</div>
          <div class="tags-container">${formalTags}${intuitiveTags}</div>
        </div>`;
                                })
                                .filter(Boolean)
                                .join("") +
                            "</div>";
                        if (!modulesHtml.includes("module-card")) {
                            modulesHtml =
                                '<div class="empty-module">无匹配标签</div>';
                        }
                    }

                    el.innerHTML = `
      <div class="mainline-header" onclick="toggleMainline('${el.id}')">
        <div class="mainline-icon ${ICON_CLASS[chain.meta.icon] || "func"}">${chain.meta.icon}</div>
        <div class="mainline-title">
          <h2>主线${String(idx + 1).padStart(2, "0")} ${chain.meta.name}</h2>
          <div class="path">${chain.meta.path}</div>
        </div>
        <div class="mainline-toggle">+</div>
      </div>
      <div class="mainline-body">${modulesHtml}</div>
    `;
                    container.appendChild(el);
                });
            }

            function toggleMainline(id) {
                document.getElementById(id).classList.toggle("expanded");
            }

            // ======== 加载 ========
            async function loadAll() {
                const chains = [];
                const files = [
                    "../../content/math/chains/01-function-analysis.md",
                    "../../content/math/chains/02-geometry-measure.md",
                    "../../content/math/chains/03-algebra-structure.md",
                    "../../content/math/chains/04-probability-statistics.md",
                    "../../content/math/chains/05-math-thinking.md",
                ];
                let useFallback = false;

                for (let i = 0; i < files.length; i++) {
                    try {
                        const res = await fetch(files[i]);
                        if (!res.ok) throw new Error("not ok");
                        const text = await res.text();
                        chains.push(parseMd(text));
                    } catch (e) {
                        useFallback = true;
                        chains.push(parseMd(FALLBACK_MD[i]));
                    }
                }

                if (useFallback) {
                    console.log(
                        "[eStudy] 使用内嵌 fallback 数据（通过本地服务器可自动加载 md 文件）",
                    );
                }

                window._chains = chains;
                renderChains(chains);

                document
                    .getElementById("searchInput")
                    .addEventListener("input", (e) => {
                        renderChains(window._chains, e.target.value);
                    });
            }

            loadAll();
